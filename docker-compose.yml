# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Trading System
#
# Services:
#   dashboard          → Streamlit UI  (http://localhost:8501)
#   scheduler          → automated daily tasks
#   cloudflared-named  → Cloudflare named tunnel (permanent public URL)
#   cloudflared-quick  → Cloudflare quick tunnel (temporary URL, no account)
#
# Quick start (all services — profiles baked into .env):
#   docker compose up -d
#
# Manual profile override:
#   docker compose --profile scheduler --profile tunnel-auth up -d   # named tunnel
#   docker compose --profile scheduler --profile tunnel up -d        # quick tunnel
#
# Switch between quick and named tunnel:
#   Change COMPOSE_PROFILES in .env:
#     COMPOSE_PROFILES=scheduler,tunnel        # quick (no token needed)
#     COMPOSE_PROFILES=scheduler,tunnel-auth   # named (set CLOUDFLARE_TUNNEL_TOKEN)
# ─────────────────────────────────────────────────────────────────────────────
services:

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: trading-system:latest
    container_name: trading-dashboard
    command: dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Corporate proxy: trust the host's CA bundle inside the container
      CURL_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
    volumes:
      # Persist data, cache and logs across container restarts
      - trading_data:/app/data
      - trading_cache:/app/cache
      - trading_logs:/app/logs
      # Mount host CA bundle so corporate proxy certs are trusted
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  scheduler:
    image: trading-system:latest
    container_name: trading-scheduler
    command: scheduler
    env_file:
      - .env
    environment:
      CURL_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
    volumes:
      - trading_data:/app/data
      - trading_cache:/app/cache
      - trading_logs:/app/logs
      - /etc/ssl/certs/ca-certificates.crt:/etc/ssl/certs/ca-certificates.crt:ro
    restart: unless-stopped
    depends_on:
      - dashboard
    profiles:
      - scheduler

  # ── Cloudflare Tunnel ───────────────────────────────────────────────────────
  # Quick tunnel  (no account needed — temporary public URL, changes on restart)
  #   docker compose --profile tunnel up
  #
  # Named tunnel (permanent URL — requires CLOUDFLARE_TUNNEL_TOKEN in .env)
  #   docker compose --profile tunnel-auth up
  cloudflared-quick:
    image: cloudflare/cloudflared:latest
    container_name: trading-cloudflared
    command: tunnel --no-autoupdate run --url http://dashboard:8501
    restart: unless-stopped
    depends_on:
      - dashboard
    profiles:
      - tunnel

  cloudflared-named:
    image: cloudflare/cloudflared:latest
    container_name: trading-cloudflared-auth
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    restart: unless-stopped
    depends_on:
      - dashboard
    profiles:
      - tunnel-auth

volumes:
  trading_data:
  trading_cache:
  trading_logs:
